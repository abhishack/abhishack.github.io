<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Home</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.10.4/gsap.min.js"></script>

    <script src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/16327/DrawSVGPlugin3.min.js"></script>

    <script type="module" src="./main.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-sm-4">
          <div class="timer">
            <svg
              id="svgCircleProgress"
              class="svgloader"
              height="100"
              width="100"
            >
              <circle
                id="svgCircleProgressPath"
                cx="50"
                cy="50"
                r="35"
                stroke="#fff"
                stroke-width="9"
                fill="transparent"
                ,
                transform="rotate(-90, 50, 50)"
              ></circle>
            </svg>
            <!-- transform="rotate(-90, 50, 50)" -->
            <text id="count"></text>
          </div>

          <div class="loading"><div class="bar"></div></div>
          <div class="side-text" style="position: relative">
            <h5 class="text">First Video</h5>
            <h5 class="text">Second Video</h5>
            <h5 class="text">Third Video</h5>
            <h5 class="text">Fourth Video</h5>
          </div>
        </div>

        <div class="col-sm-8">
          <div class="v-slider-frame">
            <video id="videoplayer" class="v-slide" autoplay loop muted>
              <source src="/assets/videos/1.mp4" type="video/mp4">
            </video>
            <video id="videoplayer" class="v-slide" autoplay loop muted>
              <source src="/assets/videos/2.mp4" type="video/mp4">
            </video>
            <video id="videoplayer" class="v-slide" autoplay loop muted>
              <source src="/assets/videos/3.mp4" type="video/mp4">
            </video>
            <video id="videoplayer" class="v-slide" autoplay loop muted>
              <source src="/assets/videos/4.mp4" type="video/mp4">
            </video>
          </div>
        </div>
      </div>
    </div>

    <div class="text-center">
      <button type="button" id="pause" class="btn btn-primary">Pause</button>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
